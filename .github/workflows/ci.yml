name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: src/package-lock.json

      - name: Install dependencies
        working-directory: src
        run: npm ci

      - name: Lint JavaScript
        working-directory: src
        run: npx eslint . --ignore-pattern node_modules --no-error-on-unmatched-pattern 2>&1 || echo "ESLint not configured, skipping..."

      - name: Validate package.json
        working-directory: src
        run: node -e "require('./package.json'); console.log('package.json is valid')"

      - name: Check HTML syntax
        run: |
          Get-ChildItem -Path . -Recurse -Include *.html | ForEach-Object {
            $content = Get-Content $_.FullName -Raw -ErrorAction SilentlyContinue
            if ($content -and $content -notmatch '<!DOCTYPE html>') {
              Write-Warning "$($_.Name) is missing DOCTYPE declaration"
            }
          }
